<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>For Shanto ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Floating Background -->
    <div class="background">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- Main Container -->
    <div class="container">

        <!-- Title -->
        <h1 class="title">
            I Miss You Shanto 🤍
        </h1>

        <!-- Girl Section -->
        <div class="girl-section">

            <!-- Girl SVG -->
            <object
                data="girl.svg"
                type="image/svg+xml"
                class="girl-svg">
            </object>

        </div>

        <!-- Message -->
        <div class="message-box">

            <p id="typingText">
                Shanto, I am missing you...
            </p>

        </div>

        <!-- Button -->
        <button id="speakBtn">
            💖 Click Me
        </button>

    </div>

    <!-- Floating Hearts -->
    <div class="hearts">
        <span>❤</span>
        <span>❤</span>
        <span>❤</span>
        <span>❤</span>
        <span>❤</span>
        <span>❤</span>
    </div>

    <!-- Script -->
    <script src="script.js"></script>

</body>

</html>
