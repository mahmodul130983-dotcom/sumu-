<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thinking About Shanto ❤️</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ===========================
     SKY
============================ -->

<div class="sky">

    <div class="moon"></div>

    <div class="stars"></div>

</div>


<!-- ===========================
     GROUND
============================ -->

<div class="ground"></div>



<!-- ===========================
     GIRL
============================ -->

<div class="girl-area">

    <!-- Girl SVG -->

    <img
        src="sumu.svg"
        class="girl"
        id="girl">


    <!-- Lily -->

    <img
        src="lily.svg"
        class="lily"
        id="lily">



    <!-- Thought Bubble -->

    <div
        class="thought"
        id="thought">

        <div class="bubble one"></div>
        <div class="bubble two"></div>

        <div class="mainBubble">

            <img
                src="shanto.png"
                class="shantoPic"
                id="shantoPic">

        </div>

    </div>



</div>




<!-- ===========================
     FLOATING HEARTS
============================ -->

<div id="heartContainer">

<span class="heart">❤️</span>
<span class="heart">💖</span>
<span class="heart">💕</span>
<span class="heart">💗</span>
<span class="heart">💞</span>
<span class="heart">❤️</span>
<span class="heart">💖</span>

</div>




<!-- ===========================
     FIREFLIES
============================ -->

<div class="fireflies">

<div class="firefly"></div>
<div class="firefly"></div>
<div class="firefly"></div>
<div class="firefly"></div>
<div class="firefly"></div>
<div class="firefly"></div>
<div class="firefly"></div>
<div class="firefly"></div>

</div>




<!-- ===========================
     GLOW EFFECT
============================ -->

<div class="glow"></div>




<!-- ===========================
     AUDIO
============================ -->

<audio
id="bgMusic"
loop>

<source
src="music.mp3"
type="audio/mpeg">

</audio>




<script src="script.js"></script>

</body>

</html>
